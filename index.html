    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ─── Gestion du diaporama ───
        const useSlideshow = (interval = 7000) => {
            const [current, setCurrent] = useState(0);
            const slides = document.querySelectorAll('#bg-slideshow .slide');
            const total = slides.length;

            useEffect(() => {
                if (total === 0) return;
                const timer = setInterval(() => {
                    const next = (current + 1) % total;
                    slides.forEach((s, i) => {
                        s.classList.toggle('active', i === next);
                    });
                    setCurrent(next);
                }, interval);
                return () => clearInterval(timer);
            }, [current, total, interval, slides]);

            return { current, total };
        };

        // ─── Three.js Preview ───
        const ThreeDPreview = () => {
            const mountRef = useRef(null);

            useEffect(() => {
                const THREE = window.THREE;
                if (!THREE || !mountRef.current) return;

                const container = mountRef.current;
                const width = container.clientWidth;
                const height = Math.max(180, Math.min(320, Math.floor(width * 0.55)));

                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x080c18);

                const camera = new THREE.PerspectiveCamera(40, width / height, 0.1, 100);
                camera.position.set(0, 0.8, 2.8);
                camera.lookAt(0, 0, 0);

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
                renderer.setSize(width, height);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                container.appendChild(renderer.domElement);

                // Lights
                const ambient = new THREE.AmbientLight(0x334466, 0.6);
                scene.add(ambient);

                const key = new THREE.DirectionalLight(0xffffff, 0.9);
                key.position.set(4, 6, 5);
                key.castShadow = true;
                scene.add(key);

                const fill = new THREE.DirectionalLight(0x7c6cf0, 0.3);
                fill.position.set(-4, 2, -3);
                scene.add(fill);

                const rim = new THREE.DirectionalLight(0x2d7df5, 0.4);
                rim.position.set(0, -2, 6);
                scene.add(rim);

                const geom = new THREE.IcosahedronGeometry(0.8, 1);
                const mat = new THREE.MeshPhysicalMaterial({
                    color: 0x2d7df5,
                    metalness: 0.25,
                    roughness: 0.35,
                    clearcoat: 0.15,
                    clearcoatRoughness: 0.4,
                    emissive: 0x0a1a3a,
                    emissiveIntensity: 0.15,
                });
                const mesh = new THREE.Mesh(geom, mat);
                mesh.castShadow = true;
                scene.add(mesh);

                const wireGeom = new THREE.IcosahedronGeometry(0.82, 1);
                const wireMat = new THREE.MeshBasicMaterial({
                    color: 0x60a5fa,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.12,
                });
                const wire = new THREE.Mesh(wireGeom, wireMat);
                scene.add(wire);

                const ringGeom = new THREE.TorusGeometry(0.95, 0.015, 16, 60);
                const ringMat = new THREE.MeshBasicMaterial({
                    color: 0x2d7df5,
                    transparent: true,
                    opacity: 0.20,
                });
                const ring = new THREE.Mesh(ringGeom, ringMat);
                ring.rotation.x = Math.PI / 2.5;
                ring.rotation.z = 0.3;
                scene.add(ring);

                const floorGeom = new THREE.PlaneGeometry(6, 6);
                const floorMat = new THREE.ShadowMaterial({
                    opacity: 0.15,
                    color: 0x000000,
                });
                const floor = new THREE.Mesh(floorGeom, floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.position.y = -1.0;
                floor.receiveShadow = true;
                scene.add(floor);

                const particleCount = 160;
                const posArray = new Float32Array(particleCount * 3);
                for (let i = 0; i < particleCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 5;
                }
                const particleGeom = new THREE.BufferGeometry();
                particleGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const particleMat = new THREE.PointsMaterial({
                    color: 0x60a5fa,
                    size: 0.012,
                    transparent: true,
                    opacity: 0.25,
                });
                const particles = new THREE.Points(particleGeom, particleMat);
                scene.add(particles);

                let rafId;
                let time = 0;

                const animate = () => {
                    time += 0.005;
                    mesh.rotation.x = Math.sin(time * 0.4) * 0.15;
                    mesh.rotation.y += 0.006;
                    wire.rotation.x = mesh.rotation.x;
                    wire.rotation.y = mesh.rotation.y;
                    ring.rotation.z += 0.002;
                    ring.rotation.x = Math.PI / 2.5 + Math.sin(time * 0.3) * 0.08;
                    particles.rotation.y += 0.0004;
                    renderer.render(scene, camera);
                    rafId = requestAnimationFrame(animate);
                };
                animate();

                const handleResize = () => {
                    const w = container.clientWidth;
                    const h = Math.max(180, Math.min(320, Math.floor(w * 0.55)));
                    renderer.setSize(w, h);
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    cancelAnimationFrame(rafId);
                    window.removeEventListener('resize', handleResize);
                    renderer.dispose();
                    if (container.contains(renderer.domElement)) {
                        container.removeChild(renderer.domElement);
                    }
                };
            }, []);

            return <div ref = { mountRef }
            className = "w-full rounded-lg overflow-hidden"
            style = { { minHeight: '180px' } }
            />;
        };

        // ─── Card ───
