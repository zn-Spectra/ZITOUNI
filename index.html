                        camera.position.set(0, 1.2, 3);

                        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                        renderer.setSize(width, height);
                        renderer.setPixelRatio(window.devicePixelRatio || 1);
                        mountRef.current.appendChild(renderer.domElement);

                        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
                        scene.add(light);

                        const dir = new THREE.DirectionalLight(0xffffff, 0.6);
                        dir.position.set(5, 10, 7.5);
                        scene.add(dir);

                        scene.add(cube);

                        const floorGeo = new THREE.PlaneGeometry(10, 10);
                        const floorMat = new THREE.MeshStandardMaterial({ color: 0x0f1118, metalness: 0, roughness: 1 });

                        floor.position.y = -0.75;
                        scene.add(floor);

                        let rafId;
                        const animate = () => {
                            cube.rotation.y += 0.01;
                            cube.rotation.x += 0.005;
                            renderer.render(scene, camera);
                            rafId = requestAnimationFrame(animate);
                        };
                        animate();

                        const handleResize = () => {
                            const w = mountRef.current.clientWidth;
                            const h = Math.max(200, Math.min(400, Math.floor(w * 0.6)));
                            renderer.setSize(w, h);
                            camera.aspect = w / h;
                            camera.updateProjectionMatrix();
                        };
                        window.addEventListener('resize', handleResize);

                        return () => {
                            cancelAnimationFrame(rafId);
                            window.removeEventListener('resize', handleResize);
                            renderer.dispose();
                            mountRef.current.removeChild(renderer.domElement);
                        };
                    }, []);

                    return <div ref={mountRef} className="w-full h-64 rounded-md overflow-hidden" role="img" aria-label="3D animated preview"></div>;
