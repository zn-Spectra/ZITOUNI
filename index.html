        const { useState, useEffect, useRef, useCallback } = React;

        // ─── Hooks ───

        // Gestion du diaporama
        const useSlideshow = (interval = 6000) => {
            const [current, setCurrent] = useState(0);
            const slides = document.querySelectorAll('#bg-slideshow .slide');
            const total = slides.length;

            useEffect(() => {
                if (total === 0) return;
                const timer = setInterval(() => {
                    const next = (current + 1) % total;
                    slides.forEach((s, i) => {
                        s.classList.toggle('active', i === next);
                    });
                    setCurrent(next);
                }, interval);
                return () => clearInterval(timer);
            }, [current, total, interval, slides]);

            return { current, total };
        };

        // Compteur animé
        const useCounter = (target, duration = 2000) => {
            const [count, setCount] = useState(0);
            useEffect(() => {
                let start = 0;
                const step = Math.max(1, target / (duration / 16));
                const timer = setInterval(() => {
                    start += step;
                    if (start >= target) {
                        setCount(target);
                        clearInterval(timer);
                    } else {
                        setCount(Math.floor(start));
                    }
                }, 16);
                return () => clearInterval(timer);
            }, [target, duration]);
            return count;
        };

        // Défilement fluide
        const useSmoothScroll = () => {
            useEffect(() => {
                document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                    anchor.addEventListener('click', function(e) {
                        e.preventDefault();
                        const target = document.querySelector(this.getAttribute('href'));
                        if (target) {
                            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    });
                });
            }, []);
        };

        // Barre de progression de défilement
        const useScrollProgress = () => {
            useEffect(() => {
                const handleScroll = () => {
                    const scrollTop = window.scrollY;
                    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                    const progress = (scrollTop / docHeight) * 100;
                    document.getElementById('scrollProgress').style.width = progress + '%';
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
        };

        // Bouton retour en haut
        const useBackToTop = () => {
            const [visible, setVisible] = useState(false);
            useEffect(() => {
                const handleScroll = () => {
                    setVisible(window.scrollY > 300);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            const scrollToTop = () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            return { visible, scrollToTop };
        };

        // ─── Three.js Preview (amélioré) ───
        const ThreeDPreview = () => {
            const mountRef = useRef(null);

            useEffect(() => {
                const THREE = window.THREE;
                if (!THREE || !mountRef.current) return;

                const container = mountRef.current;
                const width = container.clientWidth;
                const height = Math.max(200, Math.min(350, Math.floor(width * 0.6)));

                const key = new THREE.DirectionalLight(0xffffff, 0.9);
                key.position.set(4, 6, 5);

                const fill = new THREE.DirectionalLight(0x7c6cf0, 0.3);
                fill.position.set(-4, 2, -3);

                const rim = new THREE.DirectionalLight(0x2d7df5, 0.4);
                rim.position.set(0, -2, 6);

                // Main object: torus knot avec wireframe
                const geom = new THREE.TorusKnotGeometry(0.65, 0.25, 64, 8, 2, 3);
                const mat = new THREE.MeshPhysicalMaterial({
                    color: 0x2d7df5,
                    metalness: 0.3,
                    roughness: 0.3,

                    emissive: 0x0a1a3a,

                const mesh = new THREE.Mesh(geom, mat);
                mesh.castShadow = true;
                mesh.position.y = 0.1;
                scene.add(mesh);

                const wireMat = new THREE.MeshBasicMaterial({
                    color: 0x60a5fa,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.10,
                });

                    transparent: true,

                floor.position.y = -0.6;

                const particleMat = new THREE.PointsMaterial({

                    size: 0.015,
                    transparent: true,
                    opacity: 0.3,

                const particles = new THREE.Points(particleGeom, particleMat);
